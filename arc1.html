// ================= GET =================
function getScene(id){
return scenes.find(s=>s.id===id)
}

function getEndingPose(){
if(score <= 20){
return {kai:"Kai Watching clock.png", dasha:"Dasha Sulk.png"}
}
else if(score < 60){
return {kai:"Kai Thinking.png", dasha:"Dasha Blushing 2.png"}
}
else{
return {kai:"Kai Smile.png", dasha:"Dasha Blushed.png"}
}
}

// ================= RENDER =================
function render(){

let s = getScene(current)
if(!s) return

// ===== ENDING CHECK =====
if([50,96,97,98,99].includes(s.id)){
let pose = getEndingPose()
kaiImg.src = pose.kai
dashaImg.src = pose.dasha

end(s.dialog[0].text)
return
}

// ===== NORMAL IMAGE =====
kaiImg.src = s.kai || ""
dashaImg.src = s.dasha || ""

choices.innerHTML=""

// ===== DIALOG =====
if(mode==="dialog"){

let line = s.dialog[sub]

// sound notif (anti spam)
if(line.text !== lastText){
playSound(notif)
lastText = line.text
}

// sound call
if(current === 11 && sub === 0){
playSound(call)
}

nameEl.innerText = line.speaker
chat.innerText = line.text

nextBtn.style.display="block"
nextBtn.innerText = (sub===s.dialog.length-1)?"PILIH":"NEXT"

nextBtn.onclick = handleNext
}

// ===== CHOICE =====
else{

nextBtn.style.display="none"

let last = s.dialog[s.dialog.length-1]

nameEl.innerText = last.speaker
chat.innerText = last.text

s.choices.forEach(c=>{

let btn = document.createElement("button")
btn.innerText = c.text

btn.onclick = ()=>{

applyScore(c.type)

nameEl.innerText="Dasha"
chat.innerText=c.reply
dashaImg.src=c.dasha

choices.innerHTML=""

nextBtn.style.display="block"
nextBtn.innerText="NEXT"

nextBtn.onclick = ()=>{
current = c.next
mode="dialog"
sub=0
render()
}
}

choices.appendChild(btn)
})
}
}

// ================= FLOW =================
function handleNext(){

let s = getScene(current)

if(sub < s.dialog.length-1){
sub++
}else{
mode="choice"
}

render()
}

// ================= END =================
function end(text){

let pose = getEndingPose()

let note=""
if(score <= 20) note="Lu maksa 😐"
else if(score < 60) note="Masih gantung 😶"
else note="Dia nyaman 😏"

document.body.innerHTML=`
<div style="display:flex;align-items:center;justify-content:center;height:100%;background:rgba(0,0,0,0.6);">

<div style="width:260px;background:#111;border-radius:20px;overflow:hidden;text-align:center;">

<img src="${pose.dasha}" style="width:100%;height:220px;object-fit:contain;background:#000;">

<div style="padding:15px;color:white;">
<h3>${text}</h3>

<div style="margin:10px 0;padding:8px;background:#fff;color:#000;border-radius:999px;">
Score: ${score}
</div>

<p style="font-size:13px;opacity:0.8;">${note}</p>

<button onclick="location.reload()" style="margin-top:10px;padding:10px;width:100%;border:none;border-radius:10px;background:#444;color:white;">
RESTART
</button>

</div>
</div>
</div>
`
}

// ================= START =================
